<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 배경 점 효과 -->
    <div class="bg-dots"></div>

    <div class="container">

        <!-- 헤더 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⬡</span>
                <span class="logo-text">MH Cloud</span>
            </div>
            <button class="login-btn" onclick="openLogin()">Log In</button>
        </header>

        <!-- 메인 -->
        <main class="main">
            <div class="hero">
                <h1 class="hero-title">나만의 클라우드</h1>
                <p class="hero-sub">개인 서버에서 운영되는 안전한 홈 클라우드 시스템</p>
            </div>

            <!-- 서비스 카드 -->
            <div class="cards">

                <div class="card" onclick="goTo('https://cloud.myhomecloud.kr')">
                    <div class="card-icon">☁️</div>
                    <div class="card-info">
                        <h2 class="card-title">Cloud</h2>
                        <p class="card-desc">파일 저장 · 공유 · 동기화</p>
                    </div>
                    <div class="card-arrow">→</div>
                    <div class="card-badge online">Online</div>
                </div>

                <div class="card" onclick="goTo('https://code.myhomecloud.kr')">
                    <div class="card-icon">💻</div>
                    <div class="card-info">
                        <h2 class="card-title">Code</h2>
                        <p class="card-desc">브라우저에서 바로 코딩</p>
                    </div>
                    <div class="card-arrow">→</div>
                    <div class="card-badge online">Online</div>
                </div>

                <div class="card" onclick="goTo('https://ai.myhomecloud.kr')">
                    <div class="card-icon">🤖</div>
                    <div class="card-info">
                        <h2 class="card-title">AI</h2>
                        <p class="card-desc">로컬 AI 챗봇 서비스</p>
                    </div>
                    <div class="card-arrow">→</div>
                    <div class="card-badge soon">Online</div>
                </div>

            </div>
        </main>

        <!-- 푸터 -->
        <footer class="footer">
            <p>© 2026 MH Cloud · Powered by Self-Hosted Server</p>
        </footer>

    </div>

    <!-- 로그인 모달 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Log In</h2>
                <button class="modal-close" onclick="closeLogin()">✕</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" placeholder="아이디를 입력하세요" id="username">
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" placeholder="비밀번호를 입력하세요" id="password">
                </div>
                <button class="submit-btn" onclick="login()">로그인</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

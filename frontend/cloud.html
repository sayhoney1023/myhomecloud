<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH Cloud - 파일 매니저</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .bg-orb1 {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
            top: -150px; left: -150px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-orb2 {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%);
            bottom: 0; right: -100px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 헤더 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-dot {
            width: 10px; height: 10px;
            background: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 10px #3b82f6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #64748b;
        }

        .breadcrumb span {
            color: #94a3b8;
            cursor: pointer;
        }

        .breadcrumb span:hover { color: #fff; }

        .breadcrumb .separator { color: #334155; }

        .breadcrumb .current { color: #fff; cursor: default; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .user-avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
        }

        .back-btn {
            padding: 7px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* 바디 */
        .body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 사이드바 */
        .sidebar {
            width: 220px;
            padding: 20px 12px;
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(255,255,255,0.02);
        }

        .nav-section {
            font-size: 10px;
            color: #334155;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 4px 10px 8px;
            margin-top: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
        }

        .nav-item.active {
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.2);
            color: #93c5fd;
        }

        .nav-icon { font-size: 15px; }

        /* 저장공간 */
        .storage-section {
            margin-top: auto;
            padding: 16px 10px 4px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .storage-label {
            font-size: 11px;
            color: #475569;
            margin-bottom: 8px;
        }

        .storage-bar-wrap {
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            height: 4px;
            margin-bottom: 6px;
        }

        .storage-bar {
            height: 4px;
            border-radius: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 0.3%;
        }

        .storage-text {
            font-size: 11px;
            color: #475569;
        }

        /* 메인 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 24px 28px;
            gap: 16px;
        }

        /* 툴바 */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toolbar-left { display: flex; gap: 8px; }

        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .btn.primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-color: transparent;
            color: #fff;
            font-weight: 500;
        }

        .btn.primary:hover { opacity: 0.85; }

        .toolbar-right { display: flex; gap: 6px; }

        .view-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .view-btn.active, .view-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* 파일 목록 */
        .file-list-wrap {
            flex: 1;
            overflow-y: auto;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }

        .file-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 80px;
            gap: 8px;
            padding: 12px 20px;
            font-size: 11px;
            color: #334155;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }

        .file-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 80px;
            gap: 8px;
            padding: 12px 20px;
            font-size: 13px;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .file-row:last-child { border-bottom: none; }

        .file-row:hover { background: rgba(255,255,255,0.05); }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
        }

        .file-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .file-icon.folder { background: rgba(245,158,11,0.15); }
        .file-icon.pdf    { background: rgba(239,68,68,0.15); }
        .file-icon.img    { background: rgba(139,92,246,0.15); }
        .file-icon.doc    { background: rgba(59,130,246,0.15); }
        .file-icon.etc    { background: rgba(100,116,139,0.15); }

        .file-meta { color: #475569; font-size: 12px; }

        .file-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .file-row:hover .file-actions { opacity: 1; }

        .action-btn {
            width: 26px; height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .action-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .action-btn.danger:hover { background: rgba(239,68,68,0.2); color: #f87171; border-color: rgba(239,68,68,0.3); }

        /* 빈 상태 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #334155;
            gap: 12px;
        }

        .empty-icon { font-size: 40px; opacity: 0.4; }
        .empty-text { font-size: 14px; }

        /* 업로드 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: rgba(15,12,41,0.95);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            padding: 28px;
            margin: 0 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 { font-size: 18px; font-weight: 600; }

        .modal-close {
            background: transparent;
            border: none;
            color: #475569;
            font-size: 18px;
            cursor: pointer;
        }

        .modal-close:hover { color: #fff; }

        .upload-zone {
            border: 2px dashed rgba(59,130,246,0.3);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: rgba(59,130,246,0.6);
            background: rgba(59,130,246,0.05);
        }

        .upload-zone-icon { font-size: 32px; margin-bottom: 10px; }
        .upload-zone-text { font-size: 14px; color: #64748b; }
        .upload-zone-text span { color: #3b82f6; }

        #fileInput { display: none; }

        .upload-progress {
            display: none;
            margin-bottom: 16px;
        }

        .progress-bar-wrap {
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            height: 6px;
            margin-top: 8px;
        }

        .progress-bar {
            height: 6px;
            border-radius: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 0%;
            transition: width 0.3s;
        }

        /* 폴더 생성 모달 */
        .input-group { margin-bottom: 16px; }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 11px 14px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus { border-color: #3b82f6; }
        .input-group input::placeholder { color: #334155; }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }

        .submit-btn:hover { opacity: 0.85; }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* 반응형 */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .file-header, .file-row { grid-template-columns: 2fr 1fr 60px; }
            .file-header div:nth-child(3), .file-row .file-meta:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<div class="bg-orb1"></div>
<div class="bg-orb2"></div>

<div class="app">

    <!-- 헤더 -->
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-dot"></div>
                <span class="logo-text">MH Cloud</span>
            </a>
            <div class="breadcrumb">
                <span class="separator">/</span>
                <span class="current" id="breadcrumbCurrent">내 파일</span>
            </div>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userName">로딩 중...</span>
            </div>
            <a href="/" class="back-btn">← 포털로</a>
        </div>
    </header>

    <div class="body">

        <!-- 사이드바 -->
        <div class="sidebar">
            <div class="nav-section">파일</div>
            <div class="nav-item active" onclick="loadFiles()">
                <span class="nav-icon">📁</span>
                내 파일
            </div>
            <div class="nav-item">
                <span class="nav-icon">🕐</span>
                최근 파일
            </div>
            <div class="nav-section">관리</div>
            <div class="nav-item">
                <span class="nav-icon">🗑️</span>
                휴지통
            </div>

            <div class="storage-section">
                <div class="storage-label">저장공간</div>
                <div class="storage-bar-wrap">
                    <div class="storage-bar" id="storageBar"></div>
                </div>
                <div class="storage-text" id="storageText">불러오는 중...</div>
            </div>
        </div>

        <!-- 메인 -->
        <div class="main">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="btn primary" onclick="openUpload()">+ 업로드</button>
                    <button class="btn" onclick="openMkdir()">📁 폴더 만들기</button>
                </div>
                <div class="toolbar-right">
                    <div class="view-btn active" title="목록 보기">≡</div>
                    <div class="view-btn" title="그리드 보기">⊞</div>
                </div>
            </div>

            <div class="file-list-wrap">
                <div class="file-header">
                    <div>이름</div>
                    <div>크기</div>
                    <div>수정일</div>
                    <div></div>
                </div>
                <div id="fileList">
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <div class="empty-text">불러오는 중...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 업로드 모달 -->
<div class="modal-overlay" id="uploadModal">
    <div class="modal">
        <div class="modal-header">
            <h2>파일 업로드</h2>
            <button class="modal-close" onclick="closeUpload()">✕</button>
        </div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-zone-icon">☁️</div>
            <div class="upload-zone-text">클릭하거나 파일을 여기로 드래그하세요<br><span>파일 선택</span></div>
        </div>
        <input type="file" id="fileInput" multiple onchange="uploadFiles(this.files)">
        <div class="upload-progress" id="uploadProgress">
            <div style="font-size: 13px; color: #94a3b8;" id="uploadFileName">업로드 중...</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
    </div>
</div>

<!-- 폴더 생성 모달 -->
<div class="modal-overlay" id="mkdirModal">
    <div class="modal">
        <div class="modal-header">
            <h2>폴더 만들기</h2>
            <button class="modal-close" onclick="closeMkdir()">✕</button>
        </div>
        <div class="input-group">
            <label>폴더 이름</label>
            <input type="text" id="folderName" placeholder="폴더 이름을 입력하세요">
        </div>
        <button class="submit-btn" onclick="createFolder()">만들기</button>
    </div>
</div>

<script>
    const API = 'https://api.myhomecloud.kr';

    function getToken() {
        return localStorage.getItem('token');
    }

    function authHeaders() {
        return { 'Authorization': 'Bearer ' + getToken() };
    }

    // 로그인 확인
    window.onload = function() {
        const token = getToken();
        const username = localStorage.getItem('username');
        if (!token || !username) {
            alert('로그인이 필요합니다.');
            window.location.href = '/';
            return;
        }
        document.getElementById('userName').textContent = username + '님';
        document.getElementById('userAvatar').textContent = username.slice(0, 2).toUpperCase();
        loadFiles();
        loadStorage();
    }

    // 파일 목록 불러오기
    async function loadFiles() {
        const list = document.getElementById('fileList');
        try {
            const res = await fetch(API + '/files/', { headers: authHeaders() });
            const data = await res.json();

            if (!data.files || data.files.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <div class="empty-text">파일이 없어요. 업로드해볼까요?</div>
                    </div>`;
                return;
            }

            // 폴더 먼저, 파일 나중
            const sorted = [...data.files].sort((a, b) => {
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                return a.name.localeCompare(b.name);
            });

            list.innerHTML = sorted.map(item => `
                <div class="file-row">
                    <div class="file-name">
                        <div class="file-icon ${getIconClass(item)}">${getIconEmoji(item)}</div>
                        <span>${item.name}</span>
                    </div>
                    <div class="file-meta">${item.type === 'folder' ? '—' : formatSize(item.size_mb)}</div>
                    <div class="file-meta">${formatDate(item.modified)}</div>
                    <div class="file-actions">
                        ${item.type !== 'folder' ? `<div class="action-btn" onclick="downloadFile('${item.name}')" title="다운로드">↓</div>` : ''}
                        <div class="action-btn danger" onclick="deleteFile(this)" data-name="${item.name}" data-type="${item.type}" title="삭제">×</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = `<div class="empty-state"><div class="empty-text">불러오기 실패</div></div>`;
        }
    }

    // 저장공간 불러오기
    async function loadStorage() {
        try {
            const res = await fetch(API + '/system/status', { headers: authHeaders() });
            const data = await res.json();
            document.getElementById('storageBar').style.width = data.disk.percent + '%';
            document.getElementById('storageText').textContent =
                `${data.disk.used_gb}GB / ${data.disk.total_gb}GB 사용 중`;
        } catch (e) {}
    }

    // 파일 업로드
    async function uploadFiles(files) {
        if (!files.length) return;
        const progress = document.getElementById('uploadProgress');
        const bar = document.getElementById('progressBar');
        const fileName = document.getElementById('uploadFileName');
        progress.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            fileName.textContent = `${file.name} 업로드 중...`;
            bar.style.width = '0%';

            const formData = new FormData();
            formData.append('file', file);

            try {
                bar.style.width = '50%';
                const res = await fetch(API + '/files/upload', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData
                });
                bar.style.width = '100%';
                if (!res.ok) throw new Error();
            } catch (e) {
                alert(`${file.name} 업로드 실패`);
            }
        }

        setTimeout(() => {
            progress.style.display = 'none';
            closeUpload();
            loadFiles();
        }, 500);
    }

    // 파일 다운로드
    function downloadFile(filename) {
        const a = document.createElement('a');
        a.href = API + '/files/download/' + encodeURIComponent(filename);
        a.download = filename;
        a.click();
    }

    // 파일/폴더 삭제
    async function deleteFile(el) {
    const name = el.dataset.name;
    const type = el.dataset.type;
    if (!confirm(`"${name}"을(를) 삭제할까요?`)) return;
    try {
        const res = await fetch(API + '/files/' + encodeURIComponent(name), {
            method: 'DELETE',
            headers: authHeaders()
        });
        if (res.ok) loadFiles();
        else alert('삭제 실패');
    } catch (e) {
        alert('삭제 실패');
    }
}
    
    // 폴더 생성
    async function createFolder() {
        const name = document.getElementById('folderName').value.trim();
        if (!name) { alert('폴더 이름을 입력해주세요'); return; }

        try {
            const res = await fetch(`${API}/files/mkdir?folder_name=${encodeURIComponent(name)}`, {
                method: 'POST',
                headers: authHeaders()
            });
            if (res.ok) {
                closeMkdir();
                loadFiles();
            } else {
                const data = await res.json();
                alert(data.detail || '폴더 생성 실패');
            }
        } catch (e) {
            alert('폴더 생성 실패');
        }
    }

    // 아이콘
    function getIconClass(item) {
        if (item.type === 'folder') return 'folder';
        const ext = item.name.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return 'img';
        if (ext === 'pdf') return 'pdf';
        if (['doc','docx','txt','md'].includes(ext)) return 'doc';
        return 'etc';
    }

    function getIconEmoji(item) {
        if (item.type === 'folder') return '📁';
        const ext = item.name.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
        if (ext === 'pdf') return '📄';
        if (['doc','docx'].includes(ext)) return '📝';
        if (['mp4','mov','avi'].includes(ext)) return '🎬';
        if (['mp3','wav'].includes(ext)) return '🎵';
        if (['zip','tar','gz'].includes(ext)) return '📦';
        return '📎';
    }

    function formatSize(mb) {
        if (mb === null || mb === undefined) return '—';
        if (mb < 1) return (mb * 1024).toFixed(0) + ' KB';
        if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
        return mb.toFixed(1) + ' MB';
    }

    function formatDate(ts) {
        if (!ts) return '—';
        const d = new Date(ts * 1000);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    // 모달
    function openUpload() { document.getElementById('uploadModal').classList.add('active'); }
    function closeUpload() {
        document.getElementById('uploadModal').classList.remove('active');
        document.getElementById('fileInput').value = '';
        document.getElementById('uploadProgress').style.display = 'none';
    }
    function openMkdir() {
        document.getElementById('folderName').value = '';
        document.getElementById('mkdirModal').classList.add('active');
    }
    function closeMkdir() { document.getElementById('mkdirModal').classList.remove('active'); }

    // 드래그 앤 드롭
    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        uploadFiles(e.dataTransfer.files);
    });

    // 모달 바깥 클릭
    document.getElementById('uploadModal').addEventListener('click', function(e) { if (e.target === this) closeUpload(); });
    document.getElementById('mkdirModal').addEventListener('click', function(e) { if (e.target === this) closeMkdir(); });

    // ESC
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeUpload(); closeMkdir(); }
    });
</script>

</body>
</html>
